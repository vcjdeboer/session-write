manifestVersion: 1
name: "@vcjdeboer/session-write"
version: "2026.06.29.1"
description: "Governed parameter-fill of analysis templates: an AI fills only the typed parameter slots of a frozen template, and the validate method is the deterministic gate that asserts the structure was untouched and every fill satisfies its slot contract — bounded, validated, reproducible AI authoring. Author Quarto (.qmd) or Jupyter (.ipynb) templates from structured cells (the writer owns the document layout and binds each param at its declared type) for R or Python, and wire an R project to record its work (init)."
repository: "https://github.com/vcjdeboer/session-write"

paths:
  base: manifest

models:
  - session_write.ts

additionalFiles:
  - README.md
  - LICENSE.md

labels:
  - ai-authoring
  - validation
  - templates
  - reproducibility
  - r-project
  - onboarding
  - jupyter
  - python
